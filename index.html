<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台科大EMBA 西進武嶺 報名資料查詢</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 50%, #1a3a5c 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      margin-top: 20px;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 6px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .header p { font-size: 0.95rem; opacity: 0.85; }
    .mountain-icon { font-size: 3rem; margin-bottom: 10px; }

    .card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }

    /* Login screen */
    .login-section { text-align: center; }
    .login-section h2 { font-size: 1.1rem; color: #1a3a5c; margin-bottom: 8px; font-weight: 600; }
    .login-section p { font-size: 0.88rem; color: #666; margin-bottom: 24px; line-height: 1.6; }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: white;
      color: #3c4043;
      border: 2px solid #dadce0;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .google-btn:hover { background: #f8f9fa; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
    .google-btn svg { flex-shrink: 0; }

    /* Bind screen */
    .bind-section { display: none; }
    .bind-section h2 { font-size: 1.1rem; color: #1a3a5c; margin-bottom: 8px; font-weight: 600; }
    .bind-section p { font-size: 0.88rem; color: #666; margin-bottom: 20px; line-height: 1.6; }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f4f8fc;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 20px;
    }
    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }
    .user-avatar-placeholder {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #2d6a9f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .user-info { font-size: 0.88rem; color: #444; }
    .user-info strong { color: #1a3a5c; }

    .input-group { display: flex; gap: 10px; }

    input[type="text"], input[type="date"], input[type="tel"] {
      border: 2px solid #d1dce8;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus { outline: none; border-color: #2d6a9f; }

    button.primary {
      background: #2d6a9f;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button.primary:hover { background: #1a3a5c; }
    button.primary:disabled { background: #9ab3cc; cursor: not-allowed; }

    .error-msg {
      color: #c0392b;
      font-size: 0.9rem;
      margin-top: 10px;
      display: none;
    }

    /* Data section */
    .data-section { display: none; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .greeting { color: #1a3a5c; font-size: 1.05rem; font-weight: 700; }
    .logout-btn {
      background: none;
      border: 1px solid #ccc;
      color: #666;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
    }
    .logout-btn:hover { background: #f4f4f4; }

    .divider { border: none; border-top: 1px solid #e8eef4; margin: 16px 0; }

    .info-grid { display: grid; gap: 10px; }

    .info-row {
      display: flex;
      background: #f4f8fc;
      border-radius: 8px;
      overflow: hidden;
    }
    .info-label {
      background: #2d6a9f;
      color: white;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 10px 12px;
      min-width: 90px;
      display: flex;
      align-items: center;
    }
    .info-value {
      padding: 10px 14px;
      font-size: 0.93rem;
      color: #2c3e50;
      display: flex;
      align-items: center;
    }

    .badge {
      display: inline-block;
      background: #e74c3c;
      color: white;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
    }

    .fill-section { margin-top: 20px; }
    .fill-section h3 {
      color: #c0392b;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .field-group { margin-bottom: 14px; }
    .field-group label {
      display: block;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .field-group label span { color: #c0392b; }

    .save-btn {
      width: 100%;
      padding: 13px;
      font-size: 1.05rem;
      margin-top: 6px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .save-btn:hover { background: #1e8449; }
    .save-btn:disabled { background: #9ab3cc; cursor: not-allowed; }

    .success-msg {
      background: #d5f5e3;
      border: 1px solid #a9dfbf;
      color: #1e8449;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.93rem;
      margin-top: 14px;
      display: none;
    }

    .already-filled {
      background: #d5f5e3;
      border: 1px solid #a9dfbf;
      border-radius: 8px;
      padding: 12px 16px;
      color: #1e8449;
      font-size: 0.93rem;
      margin-top: 12px;
      display: none;
    }

    .loading {
      text-align: center;
      color: #666;
      padding: 20px 0;
      font-size: 0.95rem;
    }

    @media (max-width: 400px) {
      .card { padding: 20px; }
      .header h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="mountain-icon">⛰️🚴</div>
  <h1>台科大EMBA 西進武嶺</h1>
  <p>兩天一夜挑戰活動 · 報名資料查詢補填</p>
</div>

<div class="card">

  <!-- 載入中 -->
  <div class="loading" id="loadingSection">載入中...</div>

  <!-- 1. 登入畫面 -->
  <div class="login-section" id="loginSection" style="display:none">
    <h2>請先登入以查詢您的報名資料</h2>
    <p>為保護個人資料，需使用 Google 帳號驗證身份。<br>登入後可查詢報名資訊並補填必要資料。</p>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      使用 Google 帳號登入
    </button>
  </div>

  <!-- 2. 首次綁定畫面 -->
  <div class="bind-section" id="bindSection">
    <h2>請輸入您的姓名進行綁定</h2>
    <p>首次登入需輸入報名時的姓名，系統將您的 Google 帳號與報名資料綁定，之後登入就不需再輸入。</p>

    <div class="user-badge" id="userBadge"></div>

    <div class="input-group">
      <input type="text" id="bindNameInput" placeholder="請輸入報名姓名" maxlength="10" />
      <button class="primary" onclick="bindAccount()">綁定</button>
    </div>
    <p class="error-msg" id="bindError"></p>

    <p style="margin-top:16px; font-size:0.8rem; color:#999; text-align:center">
      <a href="#" onclick="signOut(); return false;" style="color:#999">登出</a>
    </p>
  </div>

  <!-- 3. 個人資料畫面 -->
  <div class="data-section" id="dataSection">
    <div class="top-bar">
      <div class="greeting" id="greeting"></div>
      <button class="logout-btn" onclick="signOut()">登出</button>
    </div>

    <div class="info-grid" id="infoGrid"></div>

    <div class="fill-section" id="fillSection">
      <hr class="divider">
      <h3>⚠️ 請補填以下必填資料</h3>

      <div class="field-group" id="birthdayGroup">
        <label for="birthdayInput">出生年月日 <span>*</span></label>
        <input type="date" id="birthdayInput" />
      </div>

      <div class="field-group" id="phoneGroup">
        <label for="phoneInput">手機號碼 <span>*</span></label>
        <input type="tel" id="phoneInput" placeholder="例如：0912345678" maxlength="20" />
      </div>

      <button class="save-btn" onclick="saveData()" id="saveBtn">儲存資料</button>
      <div class="success-msg" id="successMsg">✅ 資料已成功儲存！感謝您的配合。</div>
    </div>

    <div class="already-filled" id="alreadyFilled">
      ✅ 您的出生年月日與手機號碼已填寫完成，無需再次補填。
    </div>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://uwejbwixeqzrpqkhkmtl.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_fZIRsFkZAjhTrM_Km7rICA_UtPEwPPg';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentParticipant = null;

  function show(sectionId) {
    ['loadingSection','loginSection','bindSection','dataSection'].forEach(id => {
      document.getElementById(id).style.display = id === sectionId ? 'block' : 'none';
    });
  }

  async function signInWithGoogle() {
    await db.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    });
  }

  async function signOut() {
    await db.auth.signOut();
    show('loginSection');
  }

  async function init() {
    show('loadingSection');
    const { data: { session } } = await db.auth.getSession();

    if (!session) {
      show('loginSection');
      return;
    }

    const user = session.user;
    const googleId = user.id;

    // 查詢是否已綁定
    const { data } = await db
      .from('participants')
      .select('*')
      .eq('google_id', googleId)
      .single();

    if (data) {
      currentParticipant = data;
      renderDataSection(data, user);
    } else {
      renderBindSection(user);
    }
  }

  function renderBindSection(user) {
    const badge = document.getElementById('userBadge');
    const name = user.user_metadata?.full_name || user.email;
    const avatar = user.user_metadata?.avatar_url;

    badge.innerHTML = avatar
      ? `<img class="user-avatar" src="${avatar}" /><div class="user-info">已登入為 <strong>${name}</strong></div>`
      : `<div class="user-avatar-placeholder">${name[0]}</div><div class="user-info">已登入為 <strong>${name}</strong></div>`;

    show('bindSection');
  }

  async function bindAccount() {
    const name = document.getElementById('bindNameInput').value.trim();
    const errEl = document.getElementById('bindError');
    errEl.style.display = 'none';

    if (!name) {
      errEl.textContent = '請輸入姓名';
      errEl.style.display = 'block';
      return;
    }

    const { data: { session } } = await db.auth.getSession();
    const googleId = session.user.id;

    // 檢查姓名是否存在且尚未被綁定
    const { data, error } = await db
      .from('participants')
      .select('*')
      .eq('name', name)
      .is('google_id', null)
      .single();

    if (error || !data) {
      errEl.textContent = `找不到「${name}」的報名資料，或此姓名已被綁定。請確認姓名是否正確。`;
      errEl.style.display = 'block';
      return;
    }

    // 綁定 google_id
    const { error: updateError } = await db
      .from('participants')
      .update({ google_id: googleId })
      .eq('id', data.id);

    if (updateError) {
      errEl.textContent = '綁定失敗，請稍後再試。';
      errEl.style.display = 'block';
      return;
    }

    currentParticipant = { ...data, google_id: googleId };
    renderDataSection(currentParticipant, session.user);
  }

  function renderDataSection(p, user) {
    const name = user.user_metadata?.full_name || user.email;
    document.getElementById('greeting').textContent = `${p.name} 您好 👋`;

    const ebike = p.rent_ebike ? '<span class="badge">租借電輔車</span>' : '否';
    const grid = document.getElementById('infoGrid');
    grid.innerHTML = `
      <div class="info-row">
        <div class="info-label">接送地點</div>
        <div class="info-value">${p.pickup_address || '—'}</div>
      </div>
      <div class="info-row">
        <div class="info-label">電輔車租借</div>
        <div class="info-value">${ebike}</div>
      </div>
      <div class="info-row">
        <div class="info-label">同房人員</div>
        <div class="info-value">${p.roommate || '—'}</div>
      </div>
    `;

    const hasBirthday = !!p.birthday;
    const hasPhone = !!(p.phone && p.phone.trim());

    if (hasBirthday && hasPhone) {
      grid.innerHTML += `
        <div class="info-row">
          <div class="info-label">出生年月日</div>
          <div class="info-value">${p.birthday}</div>
        </div>
        <div class="info-row">
          <div class="info-label">手機號碼</div>
          <div class="info-value">${p.phone}</div>
        </div>
      `;
      document.getElementById('fillSection').style.display = 'none';
      document.getElementById('alreadyFilled').style.display = 'block';
    } else {
      document.getElementById('fillSection').style.display = 'block';
      document.getElementById('alreadyFilled').style.display = 'none';
      if (hasBirthday) document.getElementById('birthdayInput').value = p.birthday;
      if (hasPhone) document.getElementById('phoneInput').value = p.phone;
    }

    show('dataSection');
  }

  async function saveData() {
    const birthday = document.getElementById('birthdayInput').value;
    const phone = document.getElementById('phoneInput').value.trim();
    const saveBtn = document.getElementById('saveBtn');

    if (!birthday) { alert('請填寫出生年月日'); return; }
    if (!phone) { alert('請填寫手機號碼'); return; }
    if (!/^[0-9\-+\s]{8,15}$/.test(phone)) {
      alert('手機號碼格式不正確，請輸入數字（例如：0912345678）');
      return;
    }

    saveBtn.disabled = true;
    saveBtn.textContent = '儲存中...';

    const { error } = await db
      .from('participants')
      .update({ birthday, phone, updated_at: new Date().toISOString() })
      .eq('id', currentParticipant.id);

    saveBtn.disabled = false;
    saveBtn.textContent = '儲存資料';

    if (error) { alert('儲存失敗，請稍後再試。'); return; }

    document.getElementById('successMsg').style.display = 'block';
    document.getElementById('saveBtn').style.display = 'none';
  }

  // 監聽登入狀態變化
  db.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN') init();
    else if (event === 'SIGNED_OUT') show('loginSection');
  });

  init();
</script>

</body>
</html>
