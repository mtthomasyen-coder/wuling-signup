<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台科大EMBA 西進武嶺 報名資料查詢</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 50%, #1a3a5c 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      margin-top: 20px;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 6px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .header p { font-size: 0.95rem; opacity: 0.85; }
    .mountain-icon { font-size: 3rem; margin-bottom: 10px; }

    .card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }

    .search-section h2 {
      font-size: 1.1rem;
      color: #1a3a5c;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .input-group { display: flex; gap: 10px; }

    input[type="text"], input[type="date"], input[type="tel"] {
      border: 2px solid #d1dce8;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus { outline: none; border-color: #2d6a9f; }

    button {
      background: #2d6a9f;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button:hover { background: #1a3a5c; }
    button:disabled { background: #9ab3cc; cursor: not-allowed; }

    .error-msg {
      color: #c0392b;
      font-size: 0.9rem;
      margin-top: 10px;
      display: none;
    }

    .result-section { display: none; margin-top: 24px; }

    .divider { border: none; border-top: 1px solid #e8eef4; margin: 20px 0; }

    .greeting {
      color: #1a3a5c;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .info-grid { display: grid; gap: 10px; }

    .info-row {
      display: flex;
      background: #f4f8fc;
      border-radius: 8px;
      overflow: hidden;
    }
    .info-label {
      background: #2d6a9f;
      color: white;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 10px 12px;
      min-width: 90px;
      display: flex;
      align-items: center;
    }
    .info-value {
      padding: 10px 14px;
      font-size: 0.93rem;
      color: #2c3e50;
      display: flex;
      align-items: center;
    }

    .badge {
      display: inline-block;
      background: #e74c3c;
      color: white;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
    }

    .fill-section { margin-top: 20px; }
    .fill-section h3 {
      color: #c0392b;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .field-group { margin-bottom: 14px; }
    .field-group label {
      display: block;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .field-group label span { color: #c0392b; }

    .save-btn {
      width: 100%;
      padding: 13px;
      font-size: 1.05rem;
      margin-top: 6px;
      background: #27ae60;
    }
    .save-btn:hover { background: #1e8449; }

    .success-msg {
      background: #d5f5e3;
      border: 1px solid #a9dfbf;
      color: #1e8449;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.93rem;
      margin-top: 14px;
      display: none;
    }

    .already-filled {
      background: #d5f5e3;
      border: 1px solid #a9dfbf;
      border-radius: 8px;
      padding: 12px 16px;
      color: #1e8449;
      font-size: 0.93rem;
      margin-top: 12px;
      display: none;
    }

    .reset-btn {
      background: none;
      color: #666;
      font-size: 0.85rem;
      padding: 0;
      margin-top: 16px;
      text-decoration: underline;
      font-weight: normal;
    }
    .reset-btn:hover { background: none; color: #333; }

    @media (max-width: 400px) {
      .card { padding: 20px; }
      .header h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="mountain-icon">⛰️🚴</div>
  <h1>台科大EMBA 西進武嶺</h1>
  <p>兩天一夜挑戰活動 · 報名資料查詢補填</p>
</div>

<div class="card">
  <div class="search-section">
    <h2>請輸入您的姓名查詢報名資料</h2>
    <div class="input-group">
      <input type="text" id="nameInput" placeholder="例如：王小明" maxlength="10" />
      <button onclick="searchParticipant()">查詢</button>
    </div>
    <p class="error-msg" id="errorMsg"></p>
  </div>

  <div class="result-section" id="resultSection">
    <hr class="divider">
    <p class="greeting" id="greeting"></p>

    <div class="info-grid" id="infoGrid"></div>

    <div class="fill-section" id="fillSection">
      <hr class="divider">
      <h3>⚠️ 請補填以下必填資料</h3>

      <div class="field-group">
        <label for="birthdayInput">出生年月日 <span>*</span></label>
        <input type="date" id="birthdayInput" />
      </div>

      <div class="field-group">
        <label for="phoneInput">手機號碼 <span>*</span></label>
        <input type="tel" id="phoneInput" placeholder="例如：0912345678" maxlength="20" />
      </div>

      <button class="save-btn" onclick="saveData()" id="saveBtn">儲存資料</button>
      <div class="success-msg" id="successMsg">✅ 資料已成功儲存！感謝您的配合。</div>
    </div>

    <div class="already-filled" id="alreadyFilled">
      ✅ 您的出生年月日與手機號碼已填寫完成，無需再次補填。
    </div>

    <button class="reset-btn" onclick="resetSearch()">← 重新查詢</button>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://uwejbwixeqzrpqkhkmtl.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_fZIRsFkZAjhTrM_Km7rICA_UtPEwPPg';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentId = null;

  async function searchParticipant() {
    const name = document.getElementById('nameInput').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    const resultSection = document.getElementById('resultSection');

    errorMsg.style.display = 'none';
    resultSection.style.display = 'none';

    if (!name) {
      errorMsg.textContent = '請輸入姓名';
      errorMsg.style.display = 'block';
      return;
    }

    const { data, error } = await db
      .from('participants')
      .select('*')
      .eq('name', name);

    if (error || !data || data.length === 0) {
      errorMsg.textContent = `找不到「${name}」的報名資料，請確認姓名是否正確。`;
      errorMsg.style.display = 'block';
      return;
    }

    const p = data[0];
    currentId = p.id;
    renderResult(p);
  }

  function renderResult(p) {
    document.getElementById('greeting').textContent = `${p.name} 您好 👋`;

    const ebike = p.rent_ebike ? '<span class="badge">租借電輔車</span>' : '否';
    const grid = document.getElementById('infoGrid');
    grid.innerHTML = `
      <div class="info-row">
        <div class="info-label">接送地點</div>
        <div class="info-value">${p.pickup_address || '—'}</div>
      </div>
      <div class="info-row">
        <div class="info-label">電輔車租借</div>
        <div class="info-value">${ebike}</div>
      </div>
      <div class="info-row">
        <div class="info-label">同房人員</div>
        <div class="info-value">${p.roommate || '—'}</div>
      </div>
    `;

    const hasBirthday = !!p.birthday;
    const hasPhone = !!(p.phone && p.phone.trim());

    if (hasBirthday && hasPhone) {
      grid.innerHTML += `
        <div class="info-row">
          <div class="info-label">出生年月日</div>
          <div class="info-value">${p.birthday}</div>
        </div>
        <div class="info-row">
          <div class="info-label">手機號碼</div>
          <div class="info-value">${p.phone}</div>
        </div>
      `;
      document.getElementById('fillSection').style.display = 'none';
      document.getElementById('alreadyFilled').style.display = 'block';
    } else {
      document.getElementById('fillSection').style.display = 'block';
      document.getElementById('alreadyFilled').style.display = 'none';
      if (hasBirthday) document.getElementById('birthdayInput').value = p.birthday;
      if (hasPhone) document.getElementById('phoneInput').value = p.phone;
      document.getElementById('successMsg').style.display = 'none';
      document.getElementById('saveBtn').style.display = 'block';
    }

    document.getElementById('resultSection').style.display = 'block';
  }

  async function saveData() {
    const birthday = document.getElementById('birthdayInput').value;
    const phone = document.getElementById('phoneInput').value.trim();
    const saveBtn = document.getElementById('saveBtn');

    if (!birthday) { alert('請填寫出生年月日'); return; }
    if (!phone) { alert('請填寫手機號碼'); return; }
    if (!/^[0-9\-+\s]{8,15}$/.test(phone)) {
      alert('手機號碼格式不正確，請輸入數字（例如：0912345678）');
      return;
    }

    saveBtn.disabled = true;
    saveBtn.textContent = '儲存中...';

    const { error } = await db
      .from('participants')
      .update({ birthday, phone, updated_at: new Date().toISOString() })
      .eq('id', currentId);

    saveBtn.disabled = false;
    saveBtn.textContent = '儲存資料';

    if (error) { alert('儲存失敗，請稍後再試。'); return; }

    document.getElementById('successMsg').style.display = 'block';
    document.getElementById('saveBtn').style.display = 'none';
  }

  function resetSearch() {
    document.getElementById('nameInput').value = '';
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('birthdayInput').value = '';
    document.getElementById('phoneInput').value = '';
    document.getElementById('saveBtn').style.display = 'block';
    document.getElementById('saveBtn').disabled = false;
    currentId = null;
  }

  document.getElementById('nameInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') searchParticipant();
  });
</script>

</body>
</html>
